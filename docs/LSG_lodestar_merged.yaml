  evidence_file: packages/beacon-node/src/chain/blocks/verifyBlock.ts
  evidence_function: verifyBlockSignatures
  evidence_lines:
  - 1
  - 40
- name: VerifyBlockStateTransition
  category: validation
  description: Runs the full beacon state transition for a block including slot processing,
