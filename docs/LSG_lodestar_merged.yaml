  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: UpdateSlashingProtection
  category: validator
  description: Records the details of a signed attestation or block to prevent future
    slashing offenses.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: UpdateSlashingProtectionDB
  category: validator
  description: Records the slot and signing root of a newly signed block or attestation
