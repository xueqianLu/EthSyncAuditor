  evidence_file: packages/beacon-node/src/sync/sync.ts
  evidence_function: getSyncStatus
  evidence_lines:
  - 60
  - 160
- name: ValidateAndImportBatch
  category: block
  description: Validates a downloaded batch of blocks (BLS verification, state transitions)
    and imports them into the chain in sequence, advancing fork-choice.
  evidence_file: packages/beacon-node/src/sync/range/chain.ts
  evidence_function: processBatch
  evidence_lines:
  - 1
  - 60
- name: ValidateBackfillBatch
  category: validation
  description: Validates a batch of historical blocks downloaded during backfill sync
    by checking parent root chains and block signatures without full state transition.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: ValidateCheckpointAgainstWS
  category: validation
  description: Validates the fetched checkpoint against the configured weak subjectivity
    checkpoint, ensuring the checkpoint is compatible and within the acceptable period.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: ValidateCheckpointBlock
  category: validation
  description: Validates that the checkpoint block fetched during checkpoint sync
    is consistent with the checkpoint state (matching slot and state root) before
    initializing the anchor.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: ValidateGossipBlockConditions
  category: validation
  description: Performs the full set of gossip-level block validation checks in sequence
