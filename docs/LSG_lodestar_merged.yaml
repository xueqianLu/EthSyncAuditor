  evidence_file: packages/beacon-node/src/chain/blocks/verifyBlock.ts
  evidence_function: verifyBlockStateTransition
  evidence_lines:
  - 60
  - 120
- name: WaitForBlockProductionTime
  category: time
  description: Pauses execution until the optimal time for a proposer to propose a
    block.
  evidence_file: packages/client/src/time/slotTracker.ts
  evidence_function: waitForBlockProductionTime
  evidence_lines:
  - 650
  - 655
- name: WaitForSlotFraction
  category: time
  description: Waits until a specific fraction of the slot has elapsed (1/3 for attestation,
    2/3 for aggregation) before performing the scheduled duty.
  evidence_file: packages/validator/src/services/attestation.ts
  evidence_function: runAttestationDutiesForSlot
  evidence_lines:
  - 30
  - 50
- name: WaitUntilAggregationTime
  category: time
  description: Pauses execution until the optimal time for attestation aggregation
    within a slot.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
workflows:
- id: initial_sync
  name: Initial Sync (Range Sync)
  description: Bulk-download blocks from peers via BeaconBlocksByRange RPC. The node
    detects it needs sync from peer status messages, creates a sync chain targeting
    finalized or head targets, pipelines batch downloads with blob sidecars (post-Deneb),
    validates batches (BLS, state transition), imports blocks into fork-choice (supporting
    optimistic import when EL is syncing), handles stall detection/recovery, peer
    scoring feedback, and loops until the local head reaches the network target slot.
    Then switches to regular gossip sync. In lodestar, managed by SyncService, RangeSync,
    SyncChain, and Batch state machines.
  mode: expanded
  initial_state: initial_sync.awaiting_peers
  states:
  - id: initial_sync.awaiting_peers
    label: Awaiting Peers
    category: init
    transitions:
    - guard: PeerCountSufficient
      actions:
      - SelectSyncPeer
      - InitializeSyncManager
      next_state: initial_sync.evaluate_sync_target
      evidence:
        file: packages/beacon-node/src/sync/sync.ts
        function: getSyncStatus
        lines:
        - 60
        - 90
  - id: initial_sync.evaluate_sync_target
    label: Evaluate Sync Target
    category: decision
    transitions:
    - guard: PeerHasHigherFinalizedEpoch
      actions:
      - CreateSyncChain
      - UpdateSyncState
      next_state: initial_sync.create_batches
      evidence:
        file: packages/beacon-node/src/sync/range/range.ts
        function: addPeer
        lines:
        - 50
        - 80
    - guard: PeerHasHigherHeadSlot
      actions:
      - CreateSyncChain
      - UpdateSyncState
      next_state: initial_sync.create_batches
      evidence:
        file: packages/beacon-node/src/sync/range/range.ts
        function: addPeer
        lines:
        - 80
        - 110
    - guard: SyncComplete
      actions:
      - SwitchToRegularSync
      - SubscribeGossipTopics
      next_state: initial_sync.done
      evidence:
        file: packages/beacon-node/src/sync/sync.ts
        function: getSyncStatus
        lines:
        - 130
        - 160
  - id: initial_sync.create_batches
    label: Create Batches
    category: processing
    transitions:
    - guard: SyncChainHasPeers
      actions:
      - SelectSyncPeer
      - AdvanceBatchState
      next_state: initial_sync.requesting_blocks
      evidence:
        file: packages/beacon-node/src/sync/range/chain.ts
        function: requestBatches
        lines:
        - 1
        - 30
    - guard: SyncComplete
      actions:
      - RemoveSyncChain
      - SwitchToRegularSync
      - SubscribeGossipTopics
      - EmitSyncStateEvent
      next_state: initial_sync.done
      evidence:
        file: packages/beacon-node/src/sync/range/range.ts
        function: updateTarget
        lines:
        - 180
        - 220
  - id: initial_sync.requesting_blocks
    label: Requesting Blocks
    category: network
    transitions:
    - guard: SyncChainRequiresBlobsByRange
      actions:
      - RequestBeaconBlocksByRange
      - RequestBlobSidecarsByRange
      next_state: initial_sync.downloading
      evidence:
        file: packages/beacon-node/src/sync/range/batch.ts
        function: startDownloading
        lines:
        - 20
        - 60
    - guard: BatchIsAwaitingDownload
      actions:
      - RequestBeaconBlocksByRange
      next_state: initial_sync.downloading
      evidence:
        file: packages/beacon-node/src/sync/range/batch.ts
        function: startDownloading
        lines:
        - 1
        - 20
  - id: initial_sync.downloading
    label: Downloading Batch
    category: network
    transitions:
    - guard: BatchIsComplete
      actions:
      - AdvanceBatchState
      next_state: initial_sync.validating_batch
      evidence:
        file: packages/beacon-node/src/sync/range/batch.ts
        function: downloadingSuccess
        lines:
        - 40
        - 60
    - guard: PeerResponseTimedOut
      actions:
      - DecreasePeerScore
      - AdvanceBatchState
      next_state: initial_sync.retry_batch
      evidence:
        file: packages/beacon-node/src/sync/range/batch.ts
        function: downloadingError
        lines:
        - 30
        - 50
    - guard: MaxBatchRetriesReached
      actions:
      - PenalizeBatchPeer
      - ResetSyncChain
      next_state: initial_sync.stalled
      evidence:
        file: packages/beacon-node/src/sync/range/batch.ts
        function: downloadingError
        lines:
        - 50
        - 80
  - id: initial_sync.retry_batch
    label: Retry Batch with New Peer
    category: recovery
    transitions:
    - guard: SyncChainHasPeers
      actions:
      - SelectSyncPeer
      - AdvanceBatchState
      next_state: initial_sync.requesting_blocks
      evidence:
        file: packages/beacon-node/src/sync/range/chain.ts
        function: requestBatches
        lines:
        - 1
        - 30
    - guard: MaxBatchRetriesReached
      actions:
      - PenalizeBatchPeer
      - DisconnectPeer
      next_state: initial_sync.stalled
      evidence:
        file: packages/beacon-node/src/sync/range/batch.ts
        function: downloadingError
        lines:
        - 50
        - 80
  - id: initial_sync.validating_batch
    label: Validating Batch
    category: validation
    transitions:
    - guard: BlockPassesBatchValidation
      actions:
      - ValidateAndImportBatch
      next_state: initial_sync.importing_batch
      evidence:
        file: packages/beacon-node/src/chain/blocks/verifyBlock.ts
        function: verifyBlocksInEpoch
        lines:
        - 1
        - 60
    - guard: ChainSegmentFailedValidation
      actions:
      - PenalizeBatchPeer
      - MarkBlockAsBad
      next_state: initial_sync.retry_batch
      evidence:
        file: packages/beacon-node/src/sync/range/chain.ts
        function: onBatchResult
        lines:
        - 60
        - 100
  - id: initial_sync.importing_batch
    label: Importing Batch Blocks
    category: processing
    transitions:
    - guard: ImportedAllBatchBlocks
      actions:
      - AddBlockToForkChoice
      - UpdateForkChoiceHead
      - PersistBlockToDB
      - AdvanceBatchState
      next_state: initial_sync.post_import
      evidence:
        file: packages/beacon-node/src/sync/range/chain.ts
        function: processBatch
        lines:
        - 1
        - 60
    - guard: IsOptimisticCandidate
      actions:
      - HandleSyncingPayloadStatus
      - AddBlockToForkChoice
      - PersistBlockToDB
      next_state: initial_sync.post_import
      evidence:
        file: packages/beacon-node/src/chain/blocks/verifyBlocksExecutionPayloads.ts
        function: verifyBlocksExecutionPayload
        lines:
        - 40
        - 130
    - guard: PayloadStatusIsInvalid
      actions:
      - HandleInvalidPayloadStatus
      - InvalidateDescendants
      - PenalizeBatchPeer
      next_state: initial_sync.retry_batch
      evidence:
        file: packages/beacon-node/src/chain/blocks/verifyBlocksExecutionPayloads.ts
        function: verifyBlocksExecutionPayload
        lines:
        - 160
        - 200
  - id: initial_sync.post_import
    label: Post-Import Processing
    category: processing
    transitions:
    - guard: FinalizedCheckpointChanged
      actions:
      - UpdateFinalizedCheckpoint
      - PruneForkchoiceStore
      - NotifyELFinalizedBlock
      - EmitFinalizedCheckpointEvent
      next_state: initial_sync.check_sync_target
      evidence:
        file: packages/beacon-node/src/chain/blocks/importBlock.ts
        function: importBlock
        lines:
        - 200
        - 260
    - guard: SyncComplete
      actions:
      - RemoveSyncChain
      - SwitchToRegularSync
      - SubscribeGossipTopics
      next_state: initial_sync.done
      evidence:
        file: packages/beacon-node/src/sync/range/range.ts
        function: updateTarget
        lines:
        - 180
        - 220
    - guard: SyncChainHasPeers
      actions:
      - AdvanceBatchState
      - SelectSyncPeer
      next_state: initial_sync.create_batches
      evidence:
        file: packages/beacon-node/src/sync/range/chain.ts
        function: requestBatches
        lines:
        - 1
        - 30
  - id: initial_sync.check_sync_target
    label: Check Sync Target
    category: decision
    transitions:
    - guard: SyncComplete
      actions:
      - RemoveSyncChain
      - SwitchToRegularSync
      - SubscribeGossipTopics
      - EmitSyncStateEvent
      next_state: initial_sync.done
      evidence:
        file: packages/beacon-node/src/sync/sync.ts
        function: getSyncStatus
        lines:
        - 130
        - 160
    - guard: PeerHasHigherFinalizedEpoch
      actions: []
      next_state: initial_sync.create_batches
      evidence:
        file: packages/beacon-node/src/sync/range/range.ts
        function: addPeer
        lines:
        - 50
        - 80
  - id: initial_sync.stalled
    label: Sync Stalled
    category: recovery
    transitions:
    - guard: PeerCountSufficient
      actions:
      - ResetSyncChain
      next_state: initial_sync.create_batches
      evidence:
        file: packages/beacon-node/src/sync/range/chain.ts
        function: resetChain
        lines:
        - 1
        - 30
    - guard: SyncIsStalled
      actions:
      - DisconnectPeer
      next_state: initial_sync.awaiting_peers
      evidence:
        file: packages/beacon-node/src/sync/range/range.ts
        function: checkSyncProgress
        lines:
        - 250
        - 290
  - id: initial_sync.done
    label: Initial Sync Complete
    category: terminal
    transitions: []
- id: regular_sync
  name: Regular Sync (Gossip)
  description: Maintains chain head via GossipSub. Subscribes to beacon_block, beacon_attestation,
    beacon_aggregate_and_proof, blob_sidecar, and data_column_sidecar topics. Validates
    received blocks (gossip validation then full import), applies proposer boost for
    timely blocks, handles chain reorgs, missing parents via unknown block sync, buffering
    attestations for unknown blocks, and falls back to range sync if the head falls
    too far behind. Managed by the SyncService and GossipHandlers in lodestar.
  mode: expanded
  initial_state: regular_sync.subscribing
  states:
  - id: regular_sync.subscribing
    label: Subscribe to Gossip Topics
    category: init
    transitions:
    - guard: IsNotInitialSync
      actions:
      - SubscribeGossipTopics
      - ComputeForkDigest
      next_state: regular_sync.listening
      evidence:
        file: packages/beacon-node/src/network/network.ts
        function: subscribeGossipCoreTopics
        lines:
        - 1
        - 40
  - id: regular_sync.listening
    label: Listening for Gossip Messages
    category: idle
    transitions:
    - guard: BlockReceivedFromGossip
      actions:
      - HandleGossipBlock
      next_state: regular_sync.gossip_validate_block
      evidence:
        file: packages/beacon-node/src/network/processor/gossipHandlers.ts
        function: onBlock
        lines:
        - 1
        - 30
    - guard: GossipAttestationIsValid
      actions:
      - HandleGossipAttestation
      next_state: regular_sync.process_attestation
      evidence:
        file: packages/beacon-node/src/network/processor/gossipHandlers.ts
        function: onAttestation
        lines:
        - 1
        - 30
    - guard: AggregateIsValid
      actions:
      - HandleGossipAggregateAndProof
      next_state: regular_sync.process_aggregate
      evidence:
        file: packages/beacon-node/src/network/processor/gossipHandlers.ts
        function: onAggregateAndProof
        lines:
        - 1
        - 30
    - guard: BlobSidecarIsValid
      actions:
      - HandleGossipBlobSidecar
      next_state: regular_sync.cache_blob
      evidence:
        file: packages/beacon-node/src/network/processor/gossipHandlers.ts
        function: onBlobSidecar
        lines:
        - 1
        - 30
    - guard: DataColumnSidecarsAvailable
      actions:
      - HandleGossipDataColumnSidecar
      next_state: regular_sync.cache_blob
      evidence:
        file: packages/beacon-node/src/network/processor/gossipHandlers.ts
        function: onDataColumnSidecar
        lines:
        - 1
        - 30
    - guard: HeadSlotLagExceedsThreshold
      actions:
      - FallBackToRangeSync
      - UnsubscribeGossipTopics
      next_state: regular_sync.fallback_to_range
      evidence:
        file: packages/beacon-node/src/sync/sync.ts
        function: getSyncStatus
        lines:
        - 90
        - 130
    - guard: EpochTransitionBoundary
      actions:
      - ApplyForkChoiceOnSlotBoundary
      - NotifySlotClock
      next_state: regular_sync.listening
      evidence:
        file: packages/fork-choice/src/forkChoice/forkChoice.ts
        function: onTick
        lines:
        - 1
        - 40
  - id: regular_sync.gossip_validate_block
    label: Gossip Validate Block
    category: validation
    transitions:
    - guard: GossipBlockIsValid
      actions:
      - NotifyGossipBlockValid
      - ValidateGossipBlockConditions
      next_state: regular_sync.check_block_parent
      evidence:
        file: packages/beacon-node/src/chain/validation/block.ts
        function: validateGossipBlock
        lines:
        - 1
        - 100
    - guard: GossipValidationResultIsReject
      actions:
      - NotifyGossipBlockRejected
      - DecreasePeerScore
      next_state: regular_sync.listening
      evidence:
        file: packages/beacon-node/src/network/processor/gossipHandlers.ts
        function: validateBeaconBlock
        lines:
        - 30
        - 50
    - guard: BlockIsFromFutureSlot
      actions:
      - SaveGossipMessageForFuture
      next_state: regular_sync.listening
      evidence:
        file: packages/beacon-node/src/chain/validation/block.ts
        function: validateGossipBlock
        lines:
        - 20
        - 50
    - guard: BlockAlreadyExists
      actions:
      - RecordGossipVerdict
      next_state: regular_sync.listening
      evidence:
        file: packages/beacon-node/src/chain/blocks/verifyBlock.ts
        function: verifyBlocksSanityChecks
        lines:
        - 10
        - 30
    - guard: EquivocatingBlockDetected
      actions:
      - ValidateGossipBlockEquivocation
      next_state: regular_sync.listening
      evidence:
        file: packages/beacon-node/src/chain/validation/block.ts
        function: validateGossipBlock
        lines:
        - 80
        - 100
  - id: regular_sync.check_block_parent
    label: Check Block Parent
    category: decision
    transitions:
    - guard: BlockParentIsKnown
      actions: []
      next_state: regular_sync.verify_block
      evidence:
        file: packages/beacon-node/src/chain/blocks/verifyBlock.ts
        function: verifyBlocksSanityChecks
        lines:
        - 60
        - 100
    - guard: BlockParentIsUnknown
      actions:
      - HandleOrphanBlock
      - RequestMissingParentBlock
      next_state: regular_sync.parent_lookup
      evidence:
        file: packages/beacon-node/src/sync/unknownBlock.ts
        function: addUnknownBlock
        lines:
        - 1
        - 40
  - id: regular_sync.parent_lookup
    label: Unknown Block Parent Lookup
    category: network
    transitions:
    - guard: BlockParentIsKnown
      actions:
      - ReprocessPendingBlocks
      next_state: regular_sync.verify_block
      evidence:
        file: packages/beacon-node/src/chain/reprocess.ts
        function: onBlockImport
        lines:
        - 1
        - 30
    - guard: MaxLookupAttemptsReached
      actions:
      - DecreasePeerScore
      next_state: regular_sync.listening
      evidence:
        file: packages/beacon-node/src/sync/unknownBlock.ts
        function: downloadBlock
        lines:
        - 30
        - 60
    - guard: LookupAlreadyInProgress
      actions: []
      next_state: regular_sync.listening
      evidence:
        file: packages/beacon-node/src/sync/unknownBlock.ts
        function: addUnknownBlock
        lines:
        - 1
        - 20
  - id: regular_sync.verify_block
    label: Verify Block (Full)
    category: validation
    transitions:
    - guard: BlockPassesStateTransition
      actions:
      - VerifyBlockSignatures
      - VerifyBlockStateTransition
      - ImportBlock
      next_state: regular_sync.check_data_availability
      evidence:
        file: packages/beacon-node/src/chain/blocks/verifyBlock.ts
        function: verifyBlockStateTransition
        lines:
        - 60
        - 120
    - guard: PayloadStatusIsInvalid
      actions:
      - HandleInvalidPayloadStatus
      - InvalidateDescendants
      - MarkBlockAsBad
      - NotifyGossipBlockRejected
      next_state: regular_sync.listening
      evidence:
        file: packages/beacon-node/src/chain/blocks/verifyBlocksExecutionPayloads.ts
        function: verifyBlocksExecutionPayload
        lines:
        - 160
        - 200
    - guard: BlockIsPreMerge
      actions:
      - ImportBlock
      next_state: regular_sync.check_data_availability
      evidence:
        file: packages/beacon-node/src/chain/blocks/verifyBlocksExecutionPayloads.ts
        function: verifyBlocksExecutionPayload
        lines:
        - 1
        - 20
  - id: regular_sync.check_data_availability
    label: Check Data Availability
    category: validation
    transitions:
    - guard: BlobsAreAvailable
      actions:
      - MarkBlockAsDataAvailable
      next_state: regular_sync.import_block
      evidence:
        file: packages/beacon-node/src/chain/blocks/verifyBlobsSidecar.ts
        function: verifyBlobSidecars
        lines:
        - 1
        - 60
    - guard: BlockIsAvailabilityPending
      actions:
      - EnqueueBlockForReprocessing
