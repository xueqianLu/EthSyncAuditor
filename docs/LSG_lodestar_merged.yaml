    a structured result with the gossip verdict.
  evidence_file: packages/beacon-node/src/chain/validation/block.ts
  evidence_function: validateGossipBlock
  evidence_lines:
  - 1
  - 100
- name: ValidateGossipBlockEquivocation
  category: validation
  description: Checks whether a gossip block constitutes proposer equivocation (same
    slot and proposer but different block root) and records the equivocation for potential
    slashing.
  evidence_file: packages/beacon-node/src/chain/validation/block.ts
  evidence_function: validateGossipBlock
  evidence_lines:
  - 80
  - 100
- name: VerifyBackfillBlock
  category: validation
  description: Verifies a backfill block's signature and parent root chain linkage
    without performing full state transition, since backfill does not advance head.
  evidence_file: packages/beacon-node/src/sync/backfill/verify.ts
  evidence_function: verifyBackfillChain
  evidence_lines:
  - 1
  - 60
- name: VerifyBlockSignatures
  category: validation
  description: Batch-verifies all BLS signatures in a block (proposer, attestations,
