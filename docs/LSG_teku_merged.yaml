- id: aggregate
  name: Attestation Aggregation
  description: 'Aggregator role: check VRF-based aggregator selection, subscribe to
    committee attestation subnet, wait until 2/3 into slot, collect individual attestations,
    compute AggregateAndProof, sign and publish to global topic.'
  mode: expanded
  initial_state: aggregate.checking_selection
  states:
  - id: aggregate.checking_selection
    label: Checking Aggregator Selection
    category: evaluation
    transitions:
    - guard: SelectedAsAggregator
      actions:
      - ComputeAggregatorSelectionProof
      - SubscribeToSubnet
      next_state: aggregate.waiting_two_thirds
      evidence: null
    - guard: 'TRUE'
      actions: []
      next_state: aggregate.not_selected
      evidence: null
  - id: aggregate.waiting_two_thirds
    label: Waiting for 2/3 Slot (8 seconds)
    category: timing
    transitions:
    - guard: SlotIsAtAggregationDeadline
      actions:
      - WaitForSlotFraction
      next_state: aggregate.collecting_attestations
      evidence: null
  - id: aggregate.collecting_attestations
    label: Collecting Attestations from Pool
    category: processing
    transitions:
    - guard: NoAttestationsCollected
      actions: []
      next_state: aggregate.no_attestations
      evidence: null
    - guard: 'TRUE'
      actions:
      - CollectAttestationsForAggregation
      - IncludeOwnAttestation
      next_state: aggregate.aggregating
      evidence: null
  - id: aggregate.aggregating
    label: Aggregating Attestations
    category: processing
    transitions:
    - guard: AttestationDataMatchesForAggregation
      actions:
      - AggregateAttestations
      next_state: aggregate.signing
      evidence: null
  - id: aggregate.signing
    label: Signing AggregateAndProof
    category: crypto
    transitions:
    - guard: ValidatorKeyIsLoaded
      actions:
      - SignAggregateAndProof
      next_state: aggregate.publishing
      evidence: null
  - id: aggregate.publishing
    label: Publishing AggregateAndProof
    category: network
    transitions:
    - guard: 'TRUE'
      actions:
      - PublishAggregateAndProof
      next_state: aggregate.published
      evidence: null
