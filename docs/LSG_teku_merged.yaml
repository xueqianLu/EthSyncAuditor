workflows:
- id: initial_sync
  name: Initial Synchronization
  description: Bulk-download blocks from peers via BeaconBlocksByRange RPC. The node
    selects peers by advertised head_slot, pipelines range requests, validates batches
    (BLS, state transition, consensus), applies them to advance fork-choice, and loops
    until the local head reaches the network target slot. Then switches to regular_sync.
  mode: ''
  initial_state: initial_sync.initializing
  states:
  - id: initial_sync.initializing
    label: Initializing Initial Sync
    category: Setup
    transitions:
    - guard: 'TRUE'
      actions:
      - StartInitialSync
      next_state: initial_sync.determining_sync_state
      evidence:
        file: teku/sync/SyncService.java
        function: start
        lines:
        - 166
        - 169
  - id: initial_sync.determining_sync_state
    label: Determining Sync State
    category: SyncState
    transitions:
    - guard: IsInitialSyncInProgress
      actions: []
      next_state: initial_sync.finding_sync_target
      evidence:
        file: teku/sync/BeaconNodeInitialSyncService.java
        function: isInitialSyncActive
        lines:
        - 129
    - guard: IsNodeSyncedToHead
      actions:
      - StopInitialSync
      - TransitionToRegularSync
      next_state: initial_sync.transitioning_to_regular_sync
      evidence:
        file: teku/sync/SyncManager.java
        function: onSyncActiveStatusChanged
        lines:
        - 224
        - 228
  - id: initial_sync.finding_sync_target
    label: Finding Sync Target
    category: PeerSelection
    transitions:
    - guard: HasSuitablePeerForSync
      actions:
      - SelectSyncTarget
      - MarkPeerAsSyncTarget
      next_state: initial_sync.requesting_block_range
      evidence:
        file: teku/sync/BeaconNodeInitialSyncService.java
        function: selectSyncTarget
        lines:
        - 183
        - 199
    - guard: 'TRUE'
      actions:
      - UpdateSyncProgress
      next_state: initial_sync.finding_sync_target
      evidence:
        file: teku/sync/BeaconNodeInitialSyncService.java
        function: doSync
        lines:
        - 94
        - 96
  - id: initial_sync.requesting_block_range
    label: Requesting Block Range
    category: NetworkRequest
    transitions:
    - guard: 'TRUE'
      actions:
      - RequestBeaconBlocksByRange
      next_state: initial_sync.processing_range_response
      evidence:
        file: teku/sync/BeaconNodeInitialSyncService.java
        function: requestBlocks
        lines:
        - 213
        - 219
  - id: initial_sync.processing_range_response
    label: Processing Range Response
    category: BlockProcessing
    transitions:
    - guard: IsRangeRequestSuccessful
      actions:
      - EnqueueBlocksForProcessing
      next_state: initial_sync.validating_block_batch
      evidence:
        file: teku/sync/BeaconNodeInitialSyncService.java
        function: onBlocksReceived
        lines:
        - 231
        - 233
    - guard: 'TRUE'
      actions:
      - RemoveSyncTarget
      - FailSyncAndReset
      next_state: initial_sync.finding_sync_target
      evidence:
        file: teku/sync/BeaconNodeInitialSyncService.java
        function: onBlocksReceived
        lines:
        - 235
        - 237
  - id: initial_sync.validating_block_batch
    label: Validating Block Batch
    category: BlockValidation
    transitions:
    - guard: IsBlockBatchValid
      actions:
      - EnqueueBlocksForProcessing
      next_state: initial_sync.applying_blocks
      evidence:
        file: teku/sync/BlockProcessor.java
        function: processBlocks
        lines:
        - 104
        - 106
    - guard: 'TRUE'
      actions:
      - PenalizePeer
      next_state: initial_sync.handling_sync_failure
      evidence:
        file: teku/sync/BlockProcessor.java
        function: processBlocks
        lines:
        - 110
        - 111
  - id: initial_sync.applying_blocks
    label: Applying Blocks
    category: ChainUpdate
    transitions:
    - guard: 'TRUE'
      actions:
      - ProcessSyncBlockQueue
      - ApplyValidatedBlockBatch
      - UpdateSyncProgress
      next_state: initial_sync.updating_progress
      evidence:
        file: teku/sync/BlockProcessor.java
        function: importValidatedBlock
        lines:
        - 135
        - 136
  - id: initial_sync.updating_progress
    label: Updating Sync Progress
    category: Monitoring
    transitions:
    - guard: IsSyncRangeCompleted
      actions:
      - TransitionToHeadSync
      next_state: initial_sync.transitioning_to_head_sync
      evidence:
        file: teku/sync/BeaconNodeInitialSyncService.java
        function: doSync
        lines:
        - 100
        - 101
    - guard: 'TRUE'
      actions: []
      next_state: initial_sync.requesting_block_range
      evidence:
        file: teku/sync/BeaconNodeInitialSyncService.java
        function: doSync
        lines:
        - 94
  - id: initial_sync.transitioning_to_head_sync
    label: Transitioning to Head Sync
    category: Completion
    transitions:
    - guard: 'TRUE'
      actions:
      - StopInitialSync
      - TransitionToRegularSync
      next_state: initial_sync.transitioning_to_regular_sync
      evidence:
        file: teku/sync/SyncManager.java
        function: onSyncActiveStatusChanged
        lines:
        - 224
        - 228
  - id: initial_sync.transitioning_to_regular_sync
    label: Initial Sync Finished
    category: Completion
    transitions:
    - guard: 'TRUE'
      actions:
      - TransitionToRegularSync
      next_state: regular_sync.idle_awaiting_gossip
      evidence:
        file: teku/sync/SyncManager.java
        function: onSyncActiveStatusChanged
        lines:
        - 224
        - 228
  - id: initial_sync.handling_sync_failure
    label: Handling Sync Failure
    category: ErrorHandling
    transitions:
    - guard: 'TRUE'
      actions:
      - FailSyncAndReset
      - ResetSyncTarget
      - RemoveSyncTarget
      - BlacklistPeerForSync
      next_state: initial_sync.finding_sync_target
      evidence:
        file: teku/sync/BeaconNodeInitialSyncService.java
        function: removeSyncTarget
        lines:
        - 173
        - 178
- id: regular_sync
  name: Regular Synchronization
  description: Maintains chain head via GossipSub. Subscribes to beacon_block, beacon_attestation,
    beacon_aggregate_and_proof, etc. Validates received blocks (slot, proposer, BLS,
    state transition), imports them, updates fork-choice. Handles missing parents
    via BeaconBlocksByRoot. Falls back to range sync if too far behind.
  mode: ''
  initial_state: regular_sync.idle_awaiting_gossip
  states:
  - id: regular_sync.idle_awaiting_gossip
    label: Idle, Awaiting Gossip
    category: Ready
    transitions:
    - guard: 'TRUE'
      actions: []
      next_state: regular_sync.processing_gossip_message
      evidence:
        file: teku/networking/eth2/gossip/GossipMessageHandler.java
        function: onGossipMessage
        lines:
        - 64
        - 67
  - id: regular_sync.processing_gossip_message
    label: Processing Incoming Gossip Message
    category: Gossip
    transitions:
    - guard: IsGossipMessageTopicValid
      actions: []
      next_state: regular_sync.processing_gossip_block_pre_validation
      evidence:
        file: teku/networking/eth2/gossip/GossipMessageHandler.java
        function: onGossipMessage
        lines:
        - 74
    - guard: IsGossipMessageTopicValid
      actions: []
      next_state: regular_sync.processing_gossip_attestation_pre_validation
      evidence:
        file: teku/networking/eth2/gossip/GossipMessageHandler.java
        function: onGossipMessage
        lines:
        - 74
    - guard: IsGossipMessageTopicValid
      actions: []
      next_state: regular_sync.processing_gossip_aggregate_pre_validation
      evidence:
        file: teku/networking/eth2/gossip/GossipMessageHandler.java
        function: onGossipMessage
        lines:
        - 74
    - guard: 'TRUE'
      actions:
      - DropGossipMessage
      next_state: regular_sync.idle_awaiting_gossip
      evidence:
        file: teku/networking/eth2/gossip/GossipMessageHandler.java
        function: onGossipMessage
        lines:
        - 75
  - id: regular_sync.processing_gossip_block_pre_validation
    label: Processing Gossip Block (Pre-Validation)
    category: BlockProcessing
    transitions:
    - guard: IsGossipMessageWellFormed
      actions: []
      next_state: regular_sync.validating_gossip_block
      evidence:
        file: teku/sync/BlockProcessor.java
        function: processGossipBlock
        lines:
        - 60
        - 61
    - guard: 'TRUE'
      actions:
      - DropGossipMessage
      - ReportInvalidGossipMessage
      next_state: regular_sync.idle_awaiting_gossip
      evidence:
        file: teku/sync/BlockProcessor.java
        function: processGossipBlock
