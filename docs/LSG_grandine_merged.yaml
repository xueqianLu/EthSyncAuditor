        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::register_failure
        lines:
        - 700
        - 710
- id: regular_sync
  name: Regular Sync
  description: Maintains chain head via GossipSub. Subscribes to various topics, validates
    received blocks and attestations, imports them, and updates fork-choice. Handles
    missing parents by requesting them and falls back to range sync if too far behind.
  mode: ''
  initial_state: regular_sync.gossip_idle
  states:
  - id: regular_sync.gossip_idle
    label: Gossip Idle
    category: GossipStatus
    transitions:
    - guard: HeadSlotLagExceedsThreshold
      actions:
      - TransitionToRangeSync
      - InitiateRangeSync
      next_state: regular_sync.fallback_to_range_sync
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::check_for_range_sync_fallback
        lines:
        - 120
        - 130
    - guard: FutureBlockIsNowTimely
      actions:
      - ProcessDeferredGossipBlock
      next_state: regular_sync.processing_deferred_block
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_tick
        lines:
        - 280
        - 290
  - id: regular_sync.receiving_block
    label: Receiving Block
    category: GossipBlock
    transitions:
    - guard: BlockIsFromFutureSlot
      actions:
      - QueueFutureBlock
      next_state: regular_sync.deferring_block
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 140
        - 150
    - guard: GossipBlockIsTooFarAhead
      actions:
      - DropGossipMessage
      - LogInvalidGossipMessage
      next_state: regular_sync.handling_invalid_gossip
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 150
        - 160
    - guard: BlockIsTooOld
      actions:
      - DropGossipMessage
      - LogInvalidGossipMessage
      next_state: regular_sync.handling_invalid_gossip
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 165
        - 175
    - guard: BlockIsKnown
      actions:
      - DropGossipMessage
      next_state: regular_sync.gossip_idle
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 180
        - 190
    - guard: 'TRUE'
      actions: []
      next_state: regular_sync.validating_block
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 190
        - 195
  - id: regular_sync.validating_block
    label: Validating Block
    category: GossipBlock
    transitions:
    - guard: GossipBlockHasUnknownParent
      actions:
      - RequestMissingBlockByRoot
      next_state: regular_sync.handling_block_dependencies
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 195
        - 205
    - guard: GossipBlockIsValid
      actions: []
      next_state: regular_sync.processing_block
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 210
        - 220
    - guard: BlockProcessingFailed
      actions:
      - PenalizePeerForInvalidGossip
      - LogInvalidGossipMessage
      next_state: regular_sync.handling_invalid_gossip
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 230
        - 240
  - id: regular_sync.handling_block_dependencies
    label: Handling Block Dependencies
    category: GossipBlock
    transitions:
    - guard: BlockRequestTimedOut
      actions:
      - MarkBlockAsStalled
      - MarkPeerAsStalled
      next_state: regular_sync.stalled_block_request
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block_request_timeout
        lines:
        - 375
        - 380
    - guard: BlockRequiresBlobSidecars
      actions:
      - RequestMissingBlobSidecarsForRange
      - DeferGossipBlockProcessing
      next_state: regular_sync.deferring_block
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 225
        - 230
    - guard: 'TRUE'
      actions: []
      next_state: regular_sync.processing_block
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 205
        - 210
  - id: regular_sync.processing_block
    label: Processing Block
    category: GossipBlock
    transitions:
    - guard: GossipBlockBlobsAreFullyAvailable
      actions:
      - ProcessGossipBlock
      next_state: regular_sync.gossip_idle
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 225
        - 230
    - guard: 'TRUE'
      actions:
      - ProcessGossipBlock
      next_state: regular_sync.gossip_idle
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_block
        lines:
        - 220
        - 230
  - id: regular_sync.receiving_blob_sidecar
    label: Receiving Blob Sidecar
    category: GossipBlob
    transitions:
    - guard: BlobSidecarAlreadyKnown
      actions:
      - DropGossipMessage
      next_state: regular_sync.gossip_idle
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_blob_sidecar
        lines:
        - 310
        - 320
    - guard: 'TRUE'
      actions: []
      next_state: regular_sync.validating_blob_sidecar
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_blob_sidecar
        lines:
        - 320
        - 325
  - id: regular_sync.validating_blob_sidecar
    label: Validating Blob Sidecar
    category: GossipBlob
    transitions:
    - guard: HasBlobSidecarForBlock
      actions: []
      next_state: regular_sync.processing_block
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_blob_sidecar
        lines:
        - 325
        - 335
    - guard: BlobSidecarIsValid
      actions:
      - AddGossipBlobSidecar
      next_state: regular_sync.gossip_idle
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_blob_sidecar
        lines:
        - 340
        - 350
    - guard: 'TRUE'
      actions:
      - DropGossipMessage
      - PenalizePeerForInvalidGossip
      next_state: regular_sync.handling_invalid_gossip
      evidence:
        file: eth2_libp2p/src/sync/gossip_sync/mod.rs
        function: GossipSync::on_blob_sidecar
        lines:
        - 350
        - 360
