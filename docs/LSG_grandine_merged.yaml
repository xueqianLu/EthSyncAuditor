      next_state: initial_sync.backfilling
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::process_buffered_blocks_and_blobs
        lines:
        - 620
        - 630
  - id: initial_sync.handling_invalid_response
    label: Handling Invalid Response
    category: SyncError
    transitions:
    - guard: 'TRUE'
      actions:
      - SelectNewRangeSyncPeer
      next_state: initial_sync.requesting_peer
