  description: Stops the currently active range synchronization process.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: SubscribeToAttestationSubnet
  category: network
  description: The validator client subscribes its beacon node to a specific attestation
    subnet based on its assigned duties to receive and publish attestations.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: SwitchSyncPeerForBatch
  category: peer
  description: Reassigns a failed or timed-out range sync batch to a different peer,
    retrying the download with an alternate source.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: SwitchToRegularSync
  category: mode
  description: The node transitions from bulk-syncing historical blocks to processing
    live blocks and attestations from gossip once it reaches the chain head.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: TransitionToRangeSync
  category: sync
  description: Switches the node's synchronization mode from regular operation to
    range synchronization.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: TripBuilderCircuitBreaker
  category: builder
  description: Activates the builder circuit breaker due to consecutive failures or
    issues with the builder network.
  evidence_file: eth2_libp2p/src/validator_manager/mod.rs
  evidence_function: ValidatorManager::do_proposer_duties
  evidence_lines:
  - 460
  - 470
- name: UpdateBackfillAnchor
  category: state
  description: Updates the backfill sync anchor point in the database after a batch
    of historical blocks has been imported, tracking backfill progress toward genesis.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: UpdateGossipAttestationPool
  category: validator
  description: Adds a valid gossip attestation to the node's internal pool of attestations,
    making it available for aggregation or inclusion in blocks.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: UpdateRangeSyncTarget
  category: sync
  description: Adjusts the target block or slot for the ongoing range synchronization
    based on new network head information.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: UpdateSyncManagerState
  category: state
  description: Evaluates current sync conditions (peer statuses, head lag, active
    chains) and transitions the sync manager between Idle, SyncingFinalized, SyncingHead
    states.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: ValidateBlobKzgProofsForPayload
  category: validation
  description: Initiates KZG proof verification for blobs associated with an execution
    payload received from the execution layer.
  evidence_file: eth2_libp2p/src/engine_api/mod.rs
  evidence_function: EngineApi::new_payload
  evidence_lines:
  - 300
  - 310
- name: ValidateCheckpointStateRoot
  category: validation
  description: Verifies the state root of a checkpoint state downloaded during checkpoint
    sync matches the expected root before initializing the anchor.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: VerifyBackfillBlock
  category: validation
  description: Verifies a backfill block's signature and parent root chain linkage
    without performing full state transition, since backfill does not advance head.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
- name: VerifyStateRoot
  category: validation
  description: Verifies a checkpoint state root matches the expected value when initializing
    from a checkpoint sync source.
  evidence_file: null
  evidence_function: null
  evidence_lines: null
workflows:
- id: initial_sync
  name: Initial Sync
  description: Bulk-download blocks from peers via BeaconBlocksByRange RPC, including
    blob sidecars for Deneb. The node selects peers, pipelines range requests, validates
    and applies batches, and loops until the local head reaches the network target
    slot, then switches to regular_sync. Handles reorgs and stalls.
  mode: ''
  initial_state: initial_sync.idle
  states:
  - id: initial_sync.idle
    label: Idle
    category: SyncStatus
    transitions:
    - guard: ShouldFallBackToRangeSync
      actions:
      - StartRangeSync
      next_state: initial_sync.requesting_peer
      evidence:
        file: eth2_libp2p/src/sync/mod.rs
        function: Sync::start_sync
        lines:
        - 220
        - 230
  - id: initial_sync.requesting_peer
    label: Requesting Peer
    category: SyncPhase
    transitions:
    - guard: RangeSyncPeerIsResponsive
      actions: []
      next_state: initial_sync.requesting_blocks_and_blobs
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::start_range_sync
        lines:
        - 250
        - 260
    - guard: 'TRUE'
      actions:
      - SelectNewRangeSyncPeer
      next_state: initial_sync.requesting_peer
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::start_range_sync
        lines:
        - 250
        - 260
  - id: initial_sync.requesting_blocks_and_blobs
    label: Requesting Blocks & Blobs
    category: SyncPhase
    transitions:
    - guard: DenebIsActive
      actions:
      - RequestBlocksForRangeSync
      - RequestBlobSidecarsByRange
      next_state: initial_sync.waiting_for_response
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::start_range_sync
        lines:
        - 320
        - 322
    - guard: 'TRUE'
      actions:
      - RequestBlocksForRangeSync
      next_state: initial_sync.waiting_for_response
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::start_range_sync
        lines:
        - 315
        - 318
  - id: initial_sync.waiting_for_response
    label: Waiting for Response
    category: SyncPhase
    transitions:
    - guard: RangeSyncResponseIsMalformed
      actions:
      - ReportRangeSyncError
      - DecreasePeerScore
      next_state: initial_sync.handling_invalid_response
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::on_blocks_by_range_response
        lines:
        - 370
        - 380
    - guard: RangeSyncPeerDisconnectedDuringRequest
      actions:
      - ReportRangeSyncError
      - DecreasePeerScore
      next_state: initial_sync.handling_invalid_response
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::on_blocks_by_range_response
        lines:
        - 370
        - 380
    - guard: BeaconBlocksByRangeResponseIsValid
      actions: []
      next_state: initial_sync.processing_response
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::on_blocks_by_range_response
        lines:
        - 390
        - 410
    - guard: RangeSyncBlobRequestTimedOut
      actions:
      - ReportRangeSyncError
      - DecreasePeerScore
      next_state: initial_sync.handling_timeout
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::peer_timed_out
        lines:
        - 690
        - 700
    - guard: RangeSyncIsStalled
      actions:
      - ReportRangeSyncError
      - DecreasePeerScore
      next_state: initial_sync.stalled
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::is_stalled
        lines:
        - 720
        - 730
  - id: initial_sync.processing_response
    label: Processing Received Response
    category: SyncPhase
    transitions:
    - guard: BeaconBlocksByRangeResponseIsEmpty
      actions:
      - ReportRangeSyncError
      - DecreasePeerScore
      next_state: initial_sync.handling_empty_response
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::on_blocks_by_range_response
        lines:
        - 400
        - 405
    - guard: RangeSyncRequestedBlocksAreUnavailable
      actions:
      - ReportRangeSyncError
      - DecreasePeerScore
      next_state: initial_sync.handling_empty_response
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::on_blocks_by_range_response
        lines:
        - 400
        - 405
    - guard: RangeSyncPeerDoesNotHaveBlocks
      actions:
      - ReportRangeSyncError
      - DecreasePeerScore
      next_state: initial_sync.handling_empty_response
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::on_blocks_by_range_response
        lines:
        - 400
        - 405
    - guard: BlobSidecarsReceivedForRange
      actions: []
      next_state: initial_sync.validating_batch
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::on_blob_sidecars_by_range_response
        lines:
        - 420
        - 440
    - guard: BlobSidecarsByRangeResponseIsEmpty
      actions:
      - ReportRangeSyncError
      - DecreasePeerScore
      next_state: initial_sync.handling_empty_response
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::on_blob_sidecars_by_range_response
        lines:
        - 430
        - 435
    - guard: 'TRUE'
      actions: []
      next_state: initial_sync.validating_batch
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::on_blocks_by_range_response
        lines:
        - 410
        - 415
  - id: initial_sync.validating_batch
    label: Validating Block Batch
    category: SyncPhase
    transitions:
    - guard: RangeSyncBatchValidationFailed
      actions:
      - PenalizePeerForInvalidRangeBlocks
      - ReportRangeSyncError
      next_state: initial_sync.handling_invalid_batch
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::process_buffered_blocks_and_blobs
        lines:
        - 590
        - 600
    - guard: RangeSyncBlobKzgProofIsInvalid
      actions:
      - PenalizePeerForInvalidRangeBlocks
      - ReportRangeSyncError
      next_state: initial_sync.handling_invalid_batch
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::process_buffered_blocks_and_blobs
        lines:
        - 610
        - 620
    - guard: RangeBlockStateTransitionFailed
      actions:
      - PenalizePeerForInvalidRangeBlocks
      - ReportRangeSyncError
      next_state: initial_sync.handling_invalid_batch
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::process_buffered_blocks_and_blobs
        lines:
        - 630
        - 650
    - guard: RangeSyncBatchIsValid
      actions: []
      next_state: initial_sync.applying_batch
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::process_buffered_blocks_and_blobs
        lines:
        - 590
        - 600
  - id: initial_sync.applying_batch
    label: Applying Block Batch
    category: SyncPhase
    transitions:
    - guard: BackfillNeedsStarting
      actions:
      - StartBackfillSync
      next_state: initial_sync.backfilling
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::start_backfill_sync
        lines:
        - 450
        - 460
    - guard: FinalizedCheckpointChanged
      actions:
      - EmitChainReorgEvent
      - ResetSyncChain
      next_state: initial_sync.reorg_detected
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::check_fork_choice_update
        lines:
        - 760
        - 770
    - guard: RangeSyncCompletedSuccessfully
      actions:
      - NotifySyncComplete
      - StopRangeSync
      - ReportSuccessfulSync
      next_state: initial_sync.completed
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::sync_completed
        lines:
        - 750
        - 755
    - guard: RangeSyncMaxBlockRetriesReached
      actions:
      - ReportRangeSyncError
      - DecreasePeerScore
      next_state: initial_sync.handling_invalid_batch
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::register_failure
        lines:
        - 700
        - 710
    - guard: MaxPeerPenaltiesReachedForRangeSync
      actions:
      - BanPeer
      next_state: initial_sync.requesting_peer
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::register_failure
        lines:
        - 700
        - 710
    - guard: RangeSyncTargetIsBehindNetworkHead
      actions:
      - UpdateRangeSyncTarget
      next_state: initial_sync.requesting_blocks_and_blobs
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::start_range_sync
        lines:
        - 305
        - 315
    - guard: 'TRUE'
      actions:
      - ProcessRangeSyncBlockBatch
      - ReportRangeSyncProgress
      next_state: initial_sync.requesting_blocks_and_blobs
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::process_buffered_blocks_and_blobs
        lines:
        - 620
        - 630
  - id: initial_sync.completed
    label: Sync Completed
    category: SyncStatus
    transitions: []
  - id: initial_sync.stalled
    label: Sync Stalled
    category: SyncError
    transitions:
    - guard: 'TRUE'
      actions:
      - ResetRangeSync
      - SelectNewRangeSyncPeer
      next_state: initial_sync.requesting_peer
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::handle_stalled_sync
        lines:
        - 720
        - 730
  - id: initial_sync.reorg_detected
    label: Reorg Detected
    category: SyncError
    transitions:
    - guard: 'TRUE'
      actions:
      - RestartSync
      next_state: initial_sync.idle
      evidence:
        file: eth2_libp2p/src/sync/mod.rs
        function: Sync::event_handler
        lines:
        - 170
        - 180
  - id: initial_sync.handling_invalid_batch
    label: Handling Invalid Batch
    category: SyncError
    transitions:
    - guard: 'TRUE'
      actions:
      - SelectNewRangeSyncPeer
      next_state: initial_sync.requesting_peer
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::register_failure
        lines:
        - 700
        - 710
  - id: initial_sync.handling_empty_response
    label: Handling Empty Response
    category: SyncError
    transitions:
    - guard: 'TRUE'
      actions:
      - SelectNewRangeSyncPeer
      next_state: initial_sync.requesting_peer
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::on_blocks_by_range_response
        lines:
        - 400
        - 405
  - id: initial_sync.handling_timeout
    label: Handling Timeout
    category: SyncError
    transitions:
    - guard: 'TRUE'
      actions:
      - SelectNewRangeSyncPeer
      next_state: initial_sync.requesting_peer
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::peer_timed_out
        lines:
        - 690
        - 700
  - id: initial_sync.backfilling
    label: Backfilling
    category: SyncPhase
    transitions:
    - guard: BackfillTargetReached
      actions:
      - NotifySyncComplete
      - StopRangeSync
      - ReportSuccessfulSync
      next_state: initial_sync.completed
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::sync_completed
        lines:
        - 750
        - 755
    - guard: BackfillDataAvailabilityBoundaryReached
      actions:
      - NotifySyncComplete
      - StopRangeSync
      - ReportSuccessfulSync
      next_state: initial_sync.completed
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::sync_completed
        lines:
        - 750
        - 755
    - guard: BackfillRangeReachedFinalized
      actions:
      - NotifySyncComplete
      - StopRangeSync
      - ReportSuccessfulSync
      next_state: initial_sync.completed
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::sync_completed
        lines:
        - 750
        - 755
    - guard: BackfillSyncIsStalled
      actions:
      - ReportRangeSyncError
      - ResetBackfillSync
      next_state: initial_sync.stalled
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
        function: RangeSync::is_stalled
        lines:
        - 720
        - 730
    - guard: BackfillQueueIsEmpty
      actions:
      - RequestNextBackfillBlockBatch
      next_state: initial_sync.requesting_blocks_and_blobs
      evidence:
        file: eth2_libp2p/src/sync/range_sync/mod.rs
