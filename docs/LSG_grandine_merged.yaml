- id: checkpoint_sync
  name: Checkpoint Sync
  description: Fast bootstrap from a trusted finalized checkpoint. Fetches finalized
    state+block via Beacon API, verifies state root against weak subjectivity checkpoint,
    initializes fork-choice from the anchor, syncs forward to head, then optionally
    backfills historical blocks toward genesis. In grandine, checkpoint_sync.rs handles
    the fetch and verification, controller.rs handles anchor initialization.
  mode: expanded
  initial_state: checkpoint_sync.fetching_checkpoint
  states:
  - id: checkpoint_sync.fetching_checkpoint
    label: Fetching Checkpoint State
    category: downloading
    transitions:
    - guard: BeaconNodeIsReachable
      actions:
      - FetchCheckpointFromBeaconApi
      - FetchCheckpointState
      next_state: checkpoint_sync.verifying_checkpoint
      evidence:
        file: fork_choice_control/src/checkpoint_sync.rs
        function: fetch_checkpoint
        lines: []
  - id: checkpoint_sync.verifying_checkpoint
    label: Verifying Checkpoint
    category: validating
    transitions:
    - guard: WeakSubjectivityCheckPassed
      actions:
      - ValidateCheckpointStateRoot
      - VerifyStateRoot
      - ApplyWeakSubjectivityCheck
      next_state: checkpoint_sync.initializing_anchor
      evidence:
        file: fork_choice_control/src/checkpoint_sync.rs
        function: verify_state_root
        lines: []
    - guard: CheckpointIsWithinWSPeriod
      actions: []
      next_state: checkpoint_sync.checkpoint_failed
      evidence:
        file: fork_choice_control/src/checkpoint_sync.rs
        function: check_ws_period
        lines: []
  - id: checkpoint_sync.checkpoint_failed
    label: Checkpoint Verification Failed (Terminal)
    category: error
    transitions: []
  - id: checkpoint_sync.initializing_anchor
    label: Initializing Anchor State
    category: processing
    transitions:
    - guard: ForkChoiceStoreIsReady
      actions:
      - InitializeAnchorState
      - InitializeForkChoiceFromAnchor
      - PersistAnchorState
      next_state: checkpoint_sync.forward_sync
      evidence:
        file: fork_choice_control/src/controller.rs
        function: initialize_from_anchor
        lines: []
  - id: checkpoint_sync.forward_sync
    label: Forward Sync (Range Sync to Head)
    category: syncing
    transitions:
    - guard: SyncComplete
      actions:
      - SwitchToRegularSync
      next_state: checkpoint_sync.synced_starting_backfill
      evidence:
        file: fork_choice_control/src/sync_manager.rs
        function: is_synced
        lines: []
    - guard: PeerCountSufficient
      actions:
      - UpdateSyncManagerState
      - LogSyncProgress
      next_state: checkpoint_sync.forward_sync
      evidence:
        file: fork_choice_control/src/sync_manager.rs
        function: update_state
        lines: []
  - id: checkpoint_sync.synced_starting_backfill
    label: Synced, Starting Backfill
    category: processing
    transitions:
    - guard: ForkChoiceStoreIsReady
      actions:
      - StartBackfillSync
      next_state: checkpoint_sync.backfill_downloading
      evidence:
        file: fork_choice_control/src/sync_manager.rs
        function: start_backfill
        lines: []
  - id: checkpoint_sync.backfill_downloading
    label: Backfill Downloading
    category: downloading
    transitions:
    - guard: BatchIsComplete
      actions: []
      next_state: checkpoint_sync.backfill_validating
      evidence:
        file: fork_choice_control/src/sync_manager.rs
        function: batch_complete
        lines: []
    - guard: BackfillComplete
      actions:
      - EmitSyncStatusChangedEvent
      next_state: checkpoint_sync.backfill_complete
      evidence:
        file: fork_choice_control/src/sync_manager.rs
        function: is_backfill_complete
        lines: []
    - guard: BatchDownloadTimedOut
      actions:
      - PenalizeBatchPeer
      - SwitchSyncPeerForBatch
      next_state: checkpoint_sync.backfill_downloading
      evidence:
        file: fork_choice_control/src/sync_manager.rs
        function: handle_batch_timeout
        lines: []
  - id: checkpoint_sync.backfill_validating
    label: Backfill Validating
    category: validating
    transitions:
    - guard: BackfillBatchIsValid
      actions:
      - VerifyBackfillBlock
      - PersistBackfillBlocks
      - UpdateBackfillAnchor
      next_state: checkpoint_sync.backfill_persisted
      evidence:
        file: fork_choice_control/src/sync_manager.rs
        function: validate_backfill_batch
        lines: []
    - guard: BatchHasFailedProcessing
      actions:
      - PenalizeBatchPeer
      next_state: checkpoint_sync.backfill_downloading
      evidence:
        file: fork_choice_control/src/sync_manager.rs
        function: handle_batch_error
        lines: []
  - id: checkpoint_sync.backfill_persisted
    label: Backfill Batch Persisted
    category: processing
    transitions:
    - guard: DataAvailabilityBoundaryReached
      actions:
      - SkipBlobDownloadBeyondDABoundary
      - SelectSyncPeer
      - RequestBeaconBlocksByRange
      next_state: checkpoint_sync.backfill_downloading
      evidence:
        file: fork_choice_control/src/sync_manager.rs
        function: check_da_boundary
        lines: []
    - guard: BackfillComplete
      actions:
      - EmitSyncStatusChangedEvent
      next_state: checkpoint_sync.backfill_complete
      evidence:
        file: fork_choice_control/src/sync_manager.rs
        function: is_backfill_complete
        lines: []
    - guard: SyncChainHasPeers
      actions:
      - SelectSyncPeer
      - RequestBeaconBlocksByRange
      next_state: checkpoint_sync.backfill_downloading
      evidence:
        file: fork_choice_control/src/sync_manager.rs
        function: schedule_batch_download
        lines: []
  - id: checkpoint_sync.backfill_complete
    label: Backfill Complete (Terminal)
    category: terminal
    transitions: []
