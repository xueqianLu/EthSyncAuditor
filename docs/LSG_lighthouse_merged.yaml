    label: Processing SYNCING Status
    category: state_transition
    transitions:
    - guard: OptimisticSyncDepthExceedsLimit
      actions:
      - ExitOptimisticSync
      next_state: execute_layer_relation.error
      evidence:
        file: beacon_node/beacon_chain/src/beacon_chain.rs
        function: BeaconChain::process_syncing_payload
        lines:
        - 1850
        - 1860
    - guard: 'TRUE'
      actions:
      - AdvanceStateWithBlock
      next_state: execute_layer_relation.updating_fork_choice
      evidence:
        file: beacon_node/beacon_chain/src/beacon_chain.rs
        function: BeaconChain::process_syncing_payload
        lines:
        - 1865
