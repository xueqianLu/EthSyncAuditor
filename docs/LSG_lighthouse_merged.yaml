- id: execute_layer_relation
  name: Execution Layer Relation
  description: Manages communication between the Consensus and Execution layers via
    the Engine API. This includes payload validation, fork choice updates, and handling
    optimistic sync.
  mode: ''
  initial_state: execute_layer_relation.awaiting_block_for_processing
  states:
  - id: execute_layer_relation.awaiting_block_for_processing
    label: Awaiting Block For Processing
    category: idle
    transitions:
    - guard: ExecutionEngineCircuitBreakerIsOpen
      actions: []
      next_state: execute_layer_relation.error
      evidence:
        file: beacon_node/execution_layer/src/lib.rs
        function: ExecutionLayer::new_payload
        lines:
        - 310
        - 315
    - guard: 'TRUE'
      actions:
      - SendNewPayloadToExecutionClient
      next_state: execute_layer_relation.awaiting_payload_status
      evidence:
        file: beacon_node/beacon_chain/src/beacon_chain.rs
        function: BeaconChain::process_block_result
        lines:
        - 1650
        - 1660
  - id: execute_layer_relation.awaiting_payload_status
    label: Awaiting Payload Status
    category: exec_layer_comm
    transitions:
    - guard: ExecutionPayloadStatusIsValid
      actions: []
      next_state: execute_layer_relation.processing_valid_status
      evidence:
        file: beacon_node/beacon_chain/src/beacon_chain.rs
        function: BeaconChain::process_new_payload_result
        lines:
        - 1701
        - 1705
    - guard: ExecutionPayloadStatusIsSyncing
      actions: []
      next_state: execute_layer_relation.processing_syncing_status
      evidence:
        file: beacon_node/beacon_chain/src/beacon_chain.rs
        function: BeaconChain::process_new_payload_result
        lines:
        - 1706
        - 1710
    - guard: ExecutionPayloadStatusIsInvalid
      actions: []
      next_state: execute_layer_relation.processing_invalid_status
      evidence:
        file: beacon_node/beacon_chain/src/beacon_chain.rs
        function: BeaconChain::process_new_payload_result
        lines:
        - 1711
        - 1715
    - guard: ExecutionEngineFailureThresholdReached
      actions:
      - OpenExecutionEngineCircuitBreaker
      next_state: execute_layer_relation.error
      evidence:
