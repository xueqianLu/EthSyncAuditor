workflows:
- id: initial_sync
  name: Initial Sync
  description: Bulk-download blocks from peers via BeaconBlocksByRange RPC. The node
    selects peers by advertised head_slot, pipelines range requests, validates batches
    (BLS, state transition, consensus), applies them to advance fork-choice, and loops
    until the local head reaches the network target slot. Then switches to regular_sync.
  mode: ''
  initial_state: initial_sync.initialize
  states:
  - id: initial_sync.initialize
    label: Initialize Sync Manager
    category: SyncManager
    transitions:
    - guard: IsInitialSyncMode
      actions:
      - InitializeSyncState
      next_state: initial_sync.find_peer
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/mod.rs
        function: SyncManager::spawn_manager
        lines:
        - 1
        - 1
  - id: initial_sync.find_peer
    label: Find Range Sync Peer
    category: RangeSync
    transitions:
    - guard: HasSufficientSyncPeers
      actions:
      - FindSyncPeer
      - RequestBlocksFromBestPeer
      next_state: initial_sync.request_blocks
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/range_sync.rs
        function: RangeSync::poll
        lines:
        - 1
        - 1
    - guard: 'TRUE'
      actions: []
      next_state: initial_sync.find_peer
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/range_sync.rs
        function: RangeSync::poll
        lines:
        - 1
        - 1
  - id: initial_sync.request_blocks
    label: Request Blocks by Range
    category: RangeSync
    transitions:
    - guard: 'TRUE'
      actions:
      - RequestBlocksByRange
      - TrackRangeSyncRequest
      next_state: initial_sync.await_response
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/range_sync.rs
        function: RangeSync::request_new_range
        lines:
        - 1
        - 1
  - id: initial_sync.await_response
    label: Await Range Sync Response
    category: RangeSync
    transitions:
    - guard: IsRangeSyncResponseSuccessful
      actions: []
      next_state: initial_sync.process_batch_basic_validation
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/range_sync.rs
        function: RangeSync::handle_blocks_response
        lines:
        - 1
        - 1
    - guard: IsRangeSyncRequestTimedOut
      actions:
      - HandleRangeSyncTimeout
      - PenalizePeerRangeSyncTimeout
      - MarkRangeSyncRequestFailed
      next_state: initial_sync.find_peer
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/range_sync.rs
        function: RangeSync::check_timeout
        lines:
        - 1
        - 1
    - guard: 'TRUE'
      actions:
      - MarkRangeSyncRequestFailed
      next_state: initial_sync.handle_error_response
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/range_sync.rs
        function: RangeSync::handle_blocks_response
        lines:
        - 1
        - 1
  - id: initial_sync.handle_error_response
    label: Handle Range Sync Error Response
    category: RangeSync
    transitions:
    - guard: IsBlockResponseEmpty
      actions:
      - MarkRangeSyncRequestFailed
      - PenalizeRangeSyncPeer
      next_state: initial_sync.find_peer
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/range_sync.rs
        function: RangeSync::handle_blocks_response
        lines:
        - 1
        - 1
    - guard: IsBlockResponseInvalid
      actions:
      - MarkRangeSyncRequestFailed
      - PenalizeRangeSyncPeer
      next_state: initial_sync.find_peer
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/range_sync.rs
        function: RangeSync::handle_blocks_response
        lines:
        - 1
        - 1
    - guard: 'TRUE'
      actions:
      - MarkRangeSyncRequestFailed
      - PenalizeRangeSyncPeer
      next_state: initial_sync.find_peer
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/range_sync.rs
        function: RangeSync::handle_blocks_response
        lines:
        - 1
        - 1
  - id: initial_sync.process_batch_basic_validation
    label: '''Process Batch: Basic Validation'''
    category: BlockProcessor
    transitions:
    - guard: IsRangeSyncResponseSuccessful
      actions:
      - ProcessRangeSyncBlockBatch
      next_state: initial_sync.process_batch_full_validation_and_import
      evidence:
        file: beacon_node/lighthouse_sync/src/block_verification.rs
        function: verify_block_batch
        lines:
        - 1
        - 1
    - guard: IsRangeSyncBlockOrderInvalid
      actions: []
      next_state: initial_sync.handle_error_response
      evidence:
        file: beacon_node/lighthouse_sync/src/block_verification.rs
        function: verify_block_batch
        lines:
        - 1
        - 1
    - guard: IsBlockParentMismatchInBatch
      actions: []
      next_state: initial_sync.handle_error_response
      evidence:
        file: beacon_node/lighthouse_sync/src/block_verification.rs
        function: verify_block_batch
        lines:
        - 1
        - 1
    - guard: 'TRUE'
      actions: []
      next_state: initial_sync.handle_error_response
      evidence:
        file: beacon_node/lighthouse_sync/src/block_verification.rs
        function: verify_block_batch
        lines:
        - 1
        - 1
  - id: initial_sync.process_batch_full_validation_and_import
    label: '''Process Batch: Full Validation and Import'''
    category: BlockProcessor
    transitions:
    - guard: IsBlockImportedSuccessfully
      actions:
      - ProcessRangeSyncBlockBatch
      - EnqueueBlockForProcessing
      - ApplyBlocks
      - UpdateChainHeadFromRangeSync
      - UpdateSyncProgressMetrics
      next_state: initial_sync.check_range_sync_completion
      evidence:
        file: beacon_node/lighthouse_sync/src/block_processor.rs
        function: process_range_sync_block_batch
        lines:
        - 1
        - 1
    - guard: IsBlockInvalid
      actions:
      - InvalidateBlock
      - MarkRangeSyncRequestFailed
      - PenalizeRangeSyncPeer
      next_state: initial_sync.find_peer
      evidence:
        file: beacon_node/lighthouse_sync/src/block_processor.rs
        function: process_range_sync_block_batch
        lines:
        - 1
        - 1
    - guard: IsBlockParentMissing
      actions:
      - InvalidateBlock
      - MarkRangeSyncRequestFailed
      - PenalizeRangeSyncPeer
      next_state: initial_sync.find_peer
      evidence:
        file: beacon_node/lighthouse_sync/src/block_processor.rs
        function: process_range_sync_block_batch
        lines:
        - 1
        - 1
  - id: initial_sync.check_range_sync_completion
    label: Check Range Sync Completion
    category: RangeSync
    transitions:
    - guard: IsSyncTargetReached
      actions:
      - FinalizeSyncProgress
      - MarkCheckpointSyncComplete
      - TransitionToRegularSync
      next_state: initial_sync.check_backfill_needed
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/mod.rs
        function: SyncManager::poll
        lines:
        - 1
        - 1
    - guard: 'TRUE'
      actions:
      - FinalizeSyncProgress
      next_state: initial_sync.find_peer
      evidence:
        file: beacon_node/lighthouse_sync/src/manager/mod.rs
        function: SyncManager::poll
        lines:
        - 1
        - 1
  - id: initial_sync.check_backfill_needed
    label: Check if Backfill Needed
    category: SyncManager
    transitions:
    - guard: IsBackfillNeeded
      actions: []
      next_state: initial_sync.start_backfill
      evidence:
