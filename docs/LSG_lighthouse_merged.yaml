        lines:
        - 550
        - 560
  - id: execute_layer_relation.processing_valid_status
    label: Processing VALID Status
    category: state_transition
    transitions:
    - guard: 'TRUE'
      actions:
      - AdvanceStateWithBlock
      next_state: execute_layer_relation.updating_fork_choice
      evidence:
        file: beacon_node/beacon_chain/src/beacon_chain.rs
        function: BeaconChain::process_valid_payload
        lines:
        - 1800
        - 1810
