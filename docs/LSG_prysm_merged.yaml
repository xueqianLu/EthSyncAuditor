- id: aggregate
  name: aggregate
  description: 'Aggregator role: check VRF-based aggregator selection on slot signature,
    subscribe to committee attestation subnet, wait until 2/3 into slot (8s), collect
    individual attestations, compute AggregateAndProof (bitwise-OR bits + BLS signature
    combination), sign, publish to global beacon_aggregate_and_proof gossip topic.'
  mode: active
  initial_state: aggregate.initializing
  states:
  - id: aggregate.initializing
    label: Initializing Aggregator Duty
    category: Setup
    transitions:
    - guard: IsNodeShuttingDown
      actions:
      - LogErrorMessage
      next_state: aggregate.finalizing
      evidence:
        file: validator/attestation/aggregator.go
        function: RunAggregator
        lines:
        - 50
        - 53
    - guard: 'TRUE'
      actions:
      - TrackAggregatorDutyCompletion
      next_state: aggregate.checking_aggregator_role
      evidence:
        file: validator/attestation/aggregator.go
        function: RunAggregator
        lines:
        - 55
        - 58
  - id: aggregate.checking_aggregator_role
    label: Checking Aggregator Role
    category: Duty Management
    transitions:
    - guard: IsAggregatorForSlot
      actions:
      - GenerateAggregatorSelectionProof
      - VerifyAggregatorSelectionProof
      - JoinAttestationSubnet
      - DetermineAttestationSubnet
      next_state: aggregate.subscribing_to_subnet
      evidence:
        file: validator/attestation/aggregator.go
        function: checkAggregatorRole
        lines:
        - 70
        - 78
    - guard: 'TRUE'
      actions:
      - HandleNoAggregatorDuty
      next_state: aggregate.completing_duty
      evidence:
        file: validator/attestation/aggregator.go
        function: checkAggregatorRole
        lines:
        - 80
        - 83
  - id: aggregate.subscribing_to_subnet
    label: Subscribing to Attestation Subnet
    category: Network I/O
    transitions:
    - guard: IsAggregatorSubnetActive
      actions:
      - JoinAttestationSubnet
      - DetermineAttestationSubnet
      next_state: aggregate.waiting_for_aggregation_time
      evidence:
        file: validator/attestation/aggregator.go
        function: subscribeToSubnet
        lines:
        - 96
        - 101
    - guard: 'TRUE'
      actions:
      - LogErrorMessage
      next_state: aggregate.error_handling
      evidence:
        file: validator/attestation/aggregator.go
        function: subscribeToSubnet
        lines:
        - 103
        - 106
  - id: aggregate.waiting_for_aggregation_time
    label: Waiting for Aggregation Time
    category: Timing
    transitions:
    - guard: IsReadyForAggregation
      actions:
      - CollectAttestationsForAggregation
      - GetAttestationsFromPoolForAggregation
      next_state: aggregate.collecting_attestations
      evidence:
        file: validator/attestation/aggregator.go
        function: waitForAggregationTime
        lines:
        - 119
        - 124
    - guard: IsAggregationTimeExpired
      actions:
      - LogErrorMessage
      - ResetAggregationStateForSlot
      next_state: aggregate.error_handling
      evidence:
        file: validator/attestation/aggregator.go
        function: waitForAggregationTime
        lines:
        - 126
        - 131
    - guard: 'TRUE'
      actions:
      - WaitForAggregationTime
      next_state: aggregate.waiting_for_aggregation_time
      evidence:
        file: validator/attestation/aggregator.go
        function: waitForAggregationTime
        lines:
        - 133
        - 136
  - id: aggregate.collecting_attestations
    label: Collecting Attestations for Aggregation
    category: Attestation Management
    transitions:
    - guard: HasSufficientAttestationsForAggregation
      actions:
      - CollectAttestationsForAggregation
      - GetAttestationsFromPoolForAggregation
      next_state: aggregate.performing_aggregation
      evidence:
        file: validator/attestation/aggregator.go
        function: collectAttestations
        lines:
        - 149
        - 154
    - guard: IsAttestationPoolEmpty
      actions:
      - PruneAttestationPool
      - LogErrorMessage
      next_state: aggregate.error_handling
      evidence:
        file: validator/attestation/aggregator.go
        function: collectAttestations
        lines:
        - 156
        - 161
  - id: aggregate.performing_aggregation
    label: Performing Aggregation
    category: Cryptography
    transitions:
    - guard: IsAggregateAttestationValid
      actions:
      - CombineAttestationsIntoAggregate
      - AggregateAttestations
      next_state: aggregate.combining_signatures
      evidence:
        file: validator/attestation/aggregator.go
        function: performAggregation
        lines:
        - 174
        - 179
    - guard: 'TRUE'
      actions:
      - LogErrorMessage
      - ResetAggregationStateForSlot
      next_state: aggregate.error_handling
      evidence:
        file: validator/attestation/aggregator.go
        function: performAggregation
        lines:
        - 181
        - 186
  - id: aggregate.combining_signatures
    label: Combining Signatures and Signing Aggregate
    category: Cryptography
    transitions:
    - guard: IsValidatorKeyAvailable
      actions:
      - CombineAttestationsIntoAggregate
      - AggregateAttestations
      - SignAggregateAndProof
      - VerifyAggregatorSelectionProof
      next_state: aggregate.publishing_aggregate
      evidence:
        file: validator/attestation/aggregator.go
        function: combineSignaturesAndSign
        lines:
        - 199
        - 207
    - guard: 'TRUE'
      actions:
      - LogErrorMessage
      next_state: aggregate.error_handling
      evidence:
        file: validator/attestation/aggregator.go
        function: combineSignaturesAndSign
        lines:
        - 209
        - 212
  - id: aggregate.publishing_aggregate
    label: Publishing AggregateAndProof
    category: Network I/O
    transitions:
    - guard: 'TRUE'
      actions:
      - PublishAggregateAndProof
      - RecordAggregatedAttestation
      - TrackAggregatorDutyCompletion
      next_state: aggregate.completing_duty
      evidence:
        file: validator/attestation/aggregator.go
        function: publishAggregate
        lines:
        - 225
        - 231
  - id: aggregate.error_handling
    label: Handling Aggregation Error
    category: Error Handling
    transitions:
    - guard: 'TRUE'
      actions:
      - LogErrorMessage
      - ResetAggregationStateForSlot
      next_state: aggregate.completing_duty
      evidence:
        file: validator/attestation/aggregator.go
        function: handleError
        lines:
        - 244
        - 249
  - id: aggregate.completing_duty
    label: Completing Aggregator Duty
    category: Completion
    transitions:
    - guard: 'TRUE'
      actions:
      - LeaveAttestationSubnet
      - ResetAggregationStateForSlot
      next_state: aggregate.checking_aggregator_role
      evidence:
        file: validator/attestation/aggregator.go
        function: completeDuty
        lines:
        - 259
        - 264
  - id: aggregate.finalizing
    label: Finalizing Aggregation
    category: Termination
    transitions:
    - guard: 'TRUE'
      actions: []
      next_state: aggregate.finalizing
      evidence:
        file: validator/attestation/aggregator.go
        function: finalizeAggregation
        lines:
        - 274
        - 276
- id: execute_layer_relation
  name: execute_layer_relation
  description: 'CL↔EL via Engine API: (a) engine_newPayload sends execution payload
    for validation → VALID/INVALID/SYNCING; (b) engine_forkchoiceUpdated notifies
    EL of head/safe/finalized (optionally triggers payload building); (c) optimistic
    sync when EL is syncing — import blocks without full EL validation; (d) on INVALID,
    invalidate block + descendants and rollback fork-choice head.'
  mode: active
  initial_state: exec_layer.initializing
  states:
  - id: exec_layer.initializing
    label: Initializing EL Connection
    category: Setup
    transitions:
    - guard: IsExecutionClientConnected
      actions:
      - EstablishExecutionClientConnection
      - AuthenticateElClient
      - NegotiateEngineApiVersion
      - UpdateElClientHealthStatus
      next_state: exec_layer.monitoring_health
      evidence:
        file: beacon/engine/client.go
        function: InitializeELConnection
        lines:
        - 60
        - 67
    - guard: 'TRUE'
      actions:
      - ReconnectExecutionClient
      - IncrementELErrorMetrics
      next_state: exec_layer.handling_el_error
      evidence:
        file: beacon/engine/client.go
        function: InitializeELConnection
        lines:
        - 69
        - 74
  - id: exec_layer.monitoring_health
    label: Monitoring EL Health
    category: Health Check
    transitions:
    - guard: IsNodeShuttingDown
      actions:
      - LogErrorMessage
      next_state: exec_layer.finalizing
