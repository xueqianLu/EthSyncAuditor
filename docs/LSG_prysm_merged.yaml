workflows:
- id: initial_sync
  name: Initial Sync (Range Sync)
  description: Bulk-download blocks from peers via BeaconBlocksByRange RPC. Prysm
    uses a round-robin blocks fetcher that pipelines range requests across multiple
    peers, validates batches (BLS, state transition), imports them to advance fork-choice,
    and loops until the local head reaches the network target slot. Post-Deneb, blob
    sidecars are fetched alongside blocks. The node then transitions to regular gossip-based
    sync.
  mode: expanded
  initial_state: initial_sync.awaiting_peers
  states:
  - id: initial_sync.awaiting_peers
    label: Awaiting Minimum Peers
    category: init
    transitions:
    - guard: PeerCountSufficient
      actions:
      - InitializeSyncManager
      next_state: initial_sync.requesting_blocks
      evidence: null
    - guard: ContextIsNotCancelled
      actions:
      - WaitForMinimumPeers
      next_state: initial_sync.awaiting_peers
      evidence: null
  - id: initial_sync.requesting_blocks
    label: Requesting Blocks by Range
    category: network
    transitions:
    - guard: SyncChainHasPeers
      actions:
      - SelectSyncPeer
      - RequestBeaconBlocksByRange
      - RequestBlobSidecarsByRange
      next_state: initial_sync.downloading_batch
      evidence: null
    - guard: PeerResponseTimedOut
      actions:
      - DecreasePeerScore
      - SwitchSyncPeerForBatch
      next_state: initial_sync.requesting_blocks
      evidence: null
    - guard: SyncComplete
      actions:
      - SwitchToRegularSync
      - SubscribeGossipTopics
      next_state: initial_sync.complete
      evidence: null
  - id: initial_sync.downloading_batch
    label: Downloading Batch
    category: network
    transitions:
    - guard: BatchIsComplete
      actions:
      - MergeBlobsWithBlocks
      - AdvanceBatchState
      next_state: initial_sync.validating_batch
      evidence: null
    - guard: BatchDownloadTimedOut
      actions:
      - DecreasePeerScore
      - SwitchSyncPeerForBatch
      next_state: initial_sync.requesting_blocks
      evidence: null
    - guard: MaxBatchRetriesReached
      actions:
      - PenalizeBatchPeer
      - ResetSyncChain
      next_state: initial_sync.stalled
      evidence: null
  - id: initial_sync.validating_batch
    label: Validating Batch (BLS + State Transition)
    category: validation
    transitions:
    - guard: BlockPassesBatchValidation
      actions:
      - ValidateAndImportBatch
      next_state: initial_sync.importing_batch
      evidence: null
    - guard: ChainSegmentFailedValidation
      actions:
      - PenalizeBatchPeer
      - MarkBlockAsBad
      next_state: initial_sync.requesting_blocks
      evidence: null
  - id: initial_sync.importing_batch
    label: Importing Batch to Fork-Choice
    category: processing
    transitions:
    - guard: BlockHasExecutionPayload
      actions:
      - SendNewPayload
      - HandleNewPayloadResponse
      next_state: initial_sync.el_validation
      evidence: null
    - guard: BlockIsPreMerge
      actions:
      - ImportBlock
      - AddBlockToForkChoice
      - PersistBlockToDB
      next_state: initial_sync.batch_imported
      evidence: null
    - guard: IsOptimisticCandidate
      actions:
      - HandleSyncingPayloadStatus
      - HandleOptimisticBlockImport
      - ImportBlock
      - AddBlockToForkChoice
      - PersistBlockToDB
      next_state: initial_sync.batch_imported
      evidence: null
  - id: initial_sync.el_validation
    label: EL Payload Validation During Sync
    category: exec
    transitions:
    - guard: PayloadStatusIsValid
      actions:
      - SetOptimisticToValid
      - ImportBlock
      - AddBlockToForkChoice
      - PersistBlockToDB
      next_state: initial_sync.batch_imported
      evidence: null
    - guard: PayloadStatusIsSyncing
      actions:
      - HandleOptimisticBlockImport
      - TransitionToOptimisticMode
      - ImportBlock
      - AddBlockToForkChoice
      - PersistBlockToDB
      next_state: initial_sync.batch_imported
      evidence: null
    - guard: PayloadStatusIsAccepted
      actions:
      - HandleOptimisticBlockImport
      - ImportBlock
      - AddBlockToForkChoice
      - PersistBlockToDB
      next_state: initial_sync.batch_imported
      evidence: null
    - guard: PayloadStatusIsInvalid
      actions:
      - HandleInvalidPayloadStatus
      - InvalidateDescendants
      - MarkBlockAsBad
      - PenalizeBatchPeer
      next_state: initial_sync.requesting_blocks
      evidence: null
    - guard: ExecutionEngineDisconnected
      actions:
      - HandleEngineApiError
      - EnqueueBlockForReprocessing
      next_state: initial_sync.el_reconnecting
      evidence: null
  - id: initial_sync.el_reconnecting
    label: EL Reconnecting
    category: exec
    transitions:
    - guard: ExecutionEngineConnected
      actions:
      - ExchangeCapabilities
      - UpdateExecutionEngineStatus
      next_state: initial_sync.importing_batch
      evidence: null
  - id: initial_sync.batch_imported
    label: Batch Imported
    category: processing
    transitions:
    - guard: FinalizedCheckpointChanged
      actions:
      - UpdateFinalizedCheckpoint
      - PruneForkchoiceStore
      - EmitFinalizedCheckpointEvent
      - NotifyELFinalizedBlock
      next_state: initial_sync.finalization_processing
      evidence: null
    - guard: ImportedAllBatchBlocks
      actions:
      - AddBlockToForkChoice
      - AdvanceBatchState
      next_state: initial_sync.requesting_blocks
      evidence: null
    - guard: SyncComplete
      actions:
      - UpdateForkChoiceHead
      - SwitchToRegularSync
      - SubscribeGossipTopics
      next_state: initial_sync.complete
      evidence: null
  - id: initial_sync.finalization_processing
    label: Finalization Processing
    category: state
    transitions:
    - guard: 'TRUE'
      actions:
      - ArchiveBlocks
      - PruneOldStates
      next_state: initial_sync.requesting_blocks
      evidence: null
  - id: initial_sync.stalled
    label: Sync Stalled
    category: error
    transitions:
    - guard: MaxBatchRetriesReached
      actions:
      - DecreasePeerScore
      - DropBatch
      next_state: initial_sync.awaiting_peers
      evidence: null
    - guard: BatchIsInRetryState
      actions:
      - SwitchSyncPeerForBatch
      next_state: initial_sync.requesting_blocks
      evidence: null
    - guard: PeerCountBelowMinimum
      actions: []
      next_state: initial_sync.awaiting_peers
      evidence: null
  - id: initial_sync.complete
    label: Initial Sync Complete
    category: terminal
    transitions: []
- id: regular_sync
  name: Regular Sync
  description: Maintains chain head via GossipSub. Subscribes to `beacon_block`, `beacon_attestation`,
    `beacon_aggregate_and_proof`, etc. Validates received blocks (slot, proposer,
    BLS, state transition), imports them, updates fork-choice. Handles missing parents
    via `BeaconBlocksByRoot`. Falls back to range sync if too far behind.
  mode: ''
  initial_state: regular_sync.start
  states:
  - id: regular_sync.start
    label: Listening for Gossip
    category: idle
    transitions:
    - guard: 'TRUE'
      actions: []
      next_state: regular_sync.listen_gossip
      evidence:
        file: beacon-chain/sync/manager.go
        function: TransitionToRegularSync
        lines:
        - 300
        - 310
  - id: regular_sync.listen_gossip
    label: Listen for Gossip Messages
    category: gossip_handling
    transitions:
    - guard: IsGossipBlockNew AND IsGossipBlockTimely AND IsGossipBlockWithinTolerance
      actions:
      - ProcessGossipBeaconBlock
      next_state: regular_sync.process_gossip_block
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: HandleBeaconBlock
        lines:
        - 100
        - 110
    - guard: IsGossipAttestationNew AND IsGossipAttestationWithinTolerance
      actions:
      - ProcessGossipAttestation
      next_state: regular_sync.process_gossip_attestation
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: HandleAttestation
        lines:
        - 115
        - 125
    - guard: 'TRUE'
      actions: []
      next_state: regular_sync.listen_gossip
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: Listen
        lines:
        - 130
        - 140
  - id: regular_sync.process_gossip_block
    label: Process Gossip Block
    category: gossip_handling
    transitions:
    - guard: IsGossipMessageWellFormed AND IsGossipMessageTopicValid AND IsGossipMessageSizeValid
        AND IsGossipMessageFromExpectedFork
      actions:
      - ValidateGossipBlock
      next_state: regular_sync.validate_gossip_block
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: ProcessGossipBeaconBlock
        lines:
        - 150
        - 160
    - guard: 'TRUE'
      actions:
      - ReportInvalidGossipMessage
      - PenalizePeer
      - DropGossipMessage
      next_state: regular_sync.penalize_and_drop
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: ProcessGossipBeaconBlock
        lines:
        - 165
        - 175
  - id: regular_sync.validate_gossip_block
    label: Validate Gossip Block
    category: validation
    transitions:
    - guard: GossipBlockHasValidSignature AND IsBlockProposerKnown AND BlockIsValid
      actions:
      - ValidateBlock
      - AddBlockToForkchoiceStore
      next_state: regular_sync.buffer_or_queue_block
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: ValidateGossipBlock
        lines:
        - 180
        - 190
    - guard: IsParentBlockMissing
      actions:
      - QueueMissingParentRequest
      next_state: regular_sync.resolve_missing_parent
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: ValidateGossipBlock
        lines:
        - 195
        - 205
    - guard: IsBlockAlreadyKnown OR IsBlockAlreadyInQueue
      actions:
      - DropGossipMessage
      next_state: regular_sync.listen_gossip
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: ValidateGossipBlock
        lines:
        - 210
        - 215
    - guard: IsBlockFromFutureSlot
      actions:
      - BufferFutureBlock
      next_state: regular_sync.buffer_or_queue_block
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: ValidateGossipBlock
        lines:
        - 220
        - 225
    - guard: 'TRUE'
      actions:
      - PenalizePeer
      - ReportInvalidGossipMessage
      - DropGossipMessage
      next_state: regular_sync.penalize_and_drop
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: ValidateGossipBlock
        lines:
        - 230
        - 240
  - id: regular_sync.buffer_or_queue_block
    label: Buffer/Queue Block
    category: block_buffering
    transitions:
    - guard: BlockQueueIsFull
      actions: []
      next_state: regular_sync.buffer_or_queue_block
      evidence:
        file: beacon-chain/block/queue.go
        function: AddBlock
        lines:
        - 50
        - 55
    - guard: '!BlockQueueIsFull'
      actions:
      - QueueGossipBlockForProcessing
      next_state: regular_sync.process_queued_blocks
      evidence:
        file: beacon-chain/block/queue.go
        function: AddBlock
        lines:
        - 60
        - 65
  - id: regular_sync.resolve_missing_parent
    label: Resolve Missing Parent
    category: network_io
    transitions:
    - guard: IsRangeRequestSuccessful
      actions:
      - RequestBeaconBlocksByRoot
      - StoreDownloadedBlock
      next_state: regular_sync.process_queued_blocks
      evidence:
        file: beacon-chain/block/retriever.go
        function: RetrieveMissingParent
        lines:
        - 100
        - 110
    - guard: 'TRUE'
      actions:
      - PenalizePeer
      next_state: regular_sync.penalize_and_drop
      evidence:
        file: beacon-chain/block/retriever.go
        function: RetrieveMissingParent
        lines:
        - 115
        - 120
  - id: regular_sync.process_gossip_attestation
    label: Process Gossip Attestation
    category: gossip_handling
    transitions:
    - guard: IsGossipMessageWellFormed AND IsGossipMessageTopicValid AND IsGossipMessageSizeValid
        AND IsGossipMessageFromExpectedFork
      actions:
      - ValidateGossipAttestation
      next_state: regular_sync.validate_gossip_attestation
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: ProcessGossipAttestation
        lines:
        - 250
        - 260
    - guard: 'TRUE'
      actions:
      - ReportInvalidGossipMessage
      - PenalizePeer
      - DropGossipMessage
      next_state: regular_sync.penalize_and_drop
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: ProcessGossipAttestation
        lines:
        - 265
        - 275
  - id: regular_sync.validate_gossip_attestation
    label: Validate Gossip Attestation
    category: validation
    transitions:
    - guard: GossipAttestationHasValidSignature AND IsAttestationDataValid AND IsAttestationValidAtHead
      actions:
      - VerifyIndividualAttestationSignatures
      next_state: regular_sync.add_attestation_to_pool
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: ValidateGossipAttestation
        lines:
        - 280
        - 290
    - guard: IsAttestationAlreadyKnown
      actions:
      - DropGossipMessage
      next_state: regular_sync.listen_gossip
      evidence:
        file: beacon-chain/p2p/gossip.go
        function: ValidateGossipAttestation
        lines:
        - 295
        - 300
    - guard: NOT IsAttestationForCurrentSlot
      actions:
      - CacheFutureAttestation
      next_state: regular_sync.buffer_or_queue_attestation
