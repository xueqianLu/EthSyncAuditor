- id: checkpoint_sync
  name: Checkpoint Sync
  description: Fast bootstrap from a trusted finalized checkpoint. Fetches finalized
    state+block via Beacon API or peer, verifies state root against weak subjectivity
    checkpoint, initializes fork-choice from the anchor, syncs forward to head, then
    optionally backfills historical blocks toward genesis (reverse range requests,
    parent-child integrity only).
  mode: ''
  initial_state: checkpoint_sync.start
  states:
  - id: checkpoint_sync.start
    label: Start
    category: sync
    transitions:
    - guard: 'TRUE'
      actions:
      - InitializeCheckpointSync
      - FetchAnchorCheckpoint
